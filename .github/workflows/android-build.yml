# Android CI Build Workflow for DIGS

name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v2

    - name: Cache Qt
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: ~/Qt
        key: qt-5.15.2-android-arm64

    - name: Install Qt for Android
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/Qt/5.15.2/android
        cd ~/Qt/5.15.2/android
        
        # Download Qt for Android source (.tar.xz has correct line endings)
        wget -q "https://download.qt.io/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz" -O qt-src.tar.xz
        tar -xf qt-src.tar.xz
        
        echo "Building Qt..."
        cd qt-everywhere-src-5.15.2
        
        bash ./configure -xplatform android-clang \
          -prefix ~/Qt/5.15.2/android \
          -nomake examples -nomake tests \
          -skip qtwebkit -skip qtwebengine \
          -ANDROID_NDK_HOST=linux-x86_64 \
          -ANDROID_NDK_PLATFORM=android-21 \
          -ANDROID_SDK_ROOT=$ANDROID_HOME || { cat config.log; exit 1; }
        
        make -j$(nproc) || exit 1
        make install || exit 1

    - name: Set up Android NDK
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"

    - name: Verify Qt Installation
      run: ls -la ~/Qt/5.15.2/android/bin/ 2>/dev/null || echo "Qt not found"

    - name: Build Android APK
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529
        export PATH=~/Qt/5.15.2/android/bin:$PATH
        export QT_QPA_PLATFORM=offscreen
        mkdir -p build && cd build
        qmake -spec android-clang ..
        make -j$(nproc)

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DIGS-debug.apk
        path: build/android-build/bin/*.apk
