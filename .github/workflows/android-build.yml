# Android CI Build Workflow for DIGS

name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Qt
      uses: jurplel/setup-qt-action@v2
      with:
        version: '5.15.2'
        host: 'linux'
        target: 'android'
        arch: 'arm64_v8a'

    - name: Set up Android NDK
      run: |
        echo "NDK_VERSION=21e" >> $GITHUB_ENV
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

    - name: Build Android APK
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21e
        mkdir -p build
        cd build
        qmake -spec android-clang ..
        make -j$(nproc)

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DIGS-debug.apk
        path: build/android-build/bin/*.apk
