# Android CI Build Workflow for DIGS

name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v2

    - name: Set up Android NDK
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"

    - name: Cache Qt
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: ~/Qt
        key: qt-5.15.2-android-arm64-v13
        restore-keys: |
          qt-5.15.2-android-arm64-

    - name: Install Qt for Android
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/Qt/5.15.2/android
        cd ~/Qt/5.15.2/android
        
        wget -q "https://download.qt.io/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz" -O qt-src.tar.xz
        tar -xf qt-src.tar.xz
        
        cd qt-everywhere-src-5.15.2
        
        # Add #include <limits>
        for f in qtbase/src/corelib/global/qfloat16.h \
                 qtbase/src/corelib/global/qendian.h \
                 qtbase/src/corelib/text/qbytearraymatcher.h; do
          if [ -f "$f" ] && ! grep -q '<limits>' "$f"; then
            sed -i '/^#include/s/^#include.*/&\n#include <limits>/' "$f"
          fi
        done
        
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529
        
        echo "Building Qt..."
        ./configure \
          -xplatform android-clang \
          -prefix ~/Qt/5.15.2/android \
          -nomake examples -nomake tests \
          -android-sdk $ANDROID_HOME \
          -android-ndk $ANDROID_NDK_ROOT \
          -android-ndk-platform android-21
        
        make -j$(nproc) || exit 1
        make install || exit 1

    - name: Build APK
      run: |
        # Clone mavlink library with both common and ardupilotmega dialects (project uses ardupilotmega which has VTOL types)
        echo "=== Cloning mavlink library ==="
        mkdir -p libs/mavlink/include/mavlink/v2.0
        git clone --depth 1 --branch master https://github.com/mavlink/c_library_v2.git libs/mavlink-temp
        cp -r libs/mavlink-temp/common/* libs/mavlink/include/mavlink/v2.0/
        cp -r libs/mavlink-temp/ardupilotmega/* libs/mavlink/include/mavlink/v2.0/
        rm -rf libs/mavlink-temp
        
        echo "=== Verifying mavlink ==="
        ls -la libs/mavlink/include/mavlink/v2.0/ | head -10
        
        export PATH=~/Qt/5.15.2/android/bin:$PATH
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529
        
        echo "=== Qt paths ==="
        ls -la ~/Qt/5.15.2/android/bin/
        
        echo "=== Checking mavlink ==="
        ls -la libs/mavlink/ 2>/dev/null || echo "mavlink not found"
        
        echo "=== Running qmake ==="
        mkdir -p build && cd build
        # Build only for ARM64 to avoid multi-arch issues and set correct mavlink path
        qmake -spec android-clang ANDROID_TARGET_ARCH=arm64-v8a DEFINES+=MAVLINK_INCLUDE_DIR=libs/mavlink/include .. 2>&1 || exit 1
        echo "=== Running make ==="
        # Only build arm64 v8a target
        make -j$(nproc) 2>&1 || exit 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DIGS-debug.apk
        path: build/android-build/bin/*.apk
